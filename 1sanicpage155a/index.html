<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sanic Fighters</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background: radial-gradient(circle at top, #0a1f44, #000814);
    font-family: Arial, Helvetica, sans-serif;
    color:white;
    overflow-x:hidden;
}

h1{
    text-align:center;
    padding:20px;
    font-size:3em;
    letter-spacing:4px;
    text-shadow:0 0 15px cyan;
}

.gallery{
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(140px,1fr));
    gap:8px;
    padding:10px;
}

.gallery img{
    width:100%;
    height:140px;
    object-fit:cover;
    cursor:pointer;
    border-radius:8px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px cyan;
}

/* Viewer */
.viewer{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.viewer img{
    max-width:90%;
    max-height:80%;
    cursor:grab;
    transition:transform 0.1s;
}

.controls{
    margin-top:15px;
}

button{
    background:#00cfff;
    border:none;
    padding:10px 20px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#00ffff;
}
</style>
</head>

<body>

<h1>⚡ SANIC FIGHTERS ⚡</h1>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
    <img id="viewImg">
    <div class="controls">
        <button onclick="prevImage()">◀ Prev</button>
        <button onclick="nextImage()">Next ▶</button>
        <button onclick="closeViewer()">Close</button>
    </div>
</div>

<script>

];

const gallery = document.getElementById("gallery");
const viewer = document.getElementById("viewer");
const viewImg = document.getElementById("viewImg");

let current = 0;
let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;

images.forEach((src,i)=>{
    const img=document.createElement("img");
    img.src=src;
    img.onclick=()=>openViewer(i);
    gallery.appendChild(img);
});

function openViewer(i){
    current=i;
    viewImg.src=images[current];
    viewer.style.display="flex";
    resetTransform();
}

function closeViewer(){
    viewer.style.display="none";
}

function nextImage(){
    current=(current+1)%images.length;
    openViewer(current);
}

function prevImage(){
    current=(current-1+images.length)%images.length;
    openViewer(current);
}

function resetTransform(){
    scale=1; posX=0; posY=0;
    updateTransform();
}

function updateTransform(){
    viewImg.style.transform=`translate(${posX}px,${posY}px) scale(${scale})`;
}

viewImg.onwheel=(e)=>{
    e.preventDefault();
    scale+=e.deltaY*-0.001;
    scale=Math.min(Math.max(.5,scale),5);
    updateTransform();
};

viewImg.onmousedown=(e)=>{
    isDragging=true;
    startX=e.clientX-posX;
    startY=e.clientY-posY;
    viewImg.style.cursor="grabbing";
};

window.onmouseup=()=>{
    isDragging=false;
    viewImg.style.cursor="grab";
};

window.onmousemove=(e)=>{
    if(!isDragging)return;
    posX=e.clientX-startX;
    posY=e.clientY-startY;
    updateTransform();
};

window.onkeydown=(e)=>{
    if(e.key==="ArrowRight")nextImage();
    if(e.key==="ArrowLeft")prevImage();
    if(e.key==="Escape")closeViewer();
};
</script>

</body>
</html>
