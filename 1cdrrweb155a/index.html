<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My CDRR screencaps</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
    background:linear-gradient(180deg,#2c3e50,#0f2027);
    color:white;
    overflow-x:hidden;
}

/* sparkly cartoon background */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.12), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.1), transparent 40%);
    pointer-events:none;
}

/* logo */
.logo{
    margin-top:20px;
}

.logo img{
    width:600px;
    max-width:90%;
    filter:drop-shadow(0 0 20px gold);
}

/* title */
h1{
    font-size:40px;
    margin:10px 0 30px 0;
    text-shadow:0 0 10px yellow;
}

/* gallery */
.gallery{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

.gallery img{
    max-width:70vw;
    max-height:60vh;
    border-radius:12px;
    border:5px solid gold;
    box-shadow:0 0 25px rgba(255,215,0,0.8);
    cursor:pointer;
}

/* buttons */
button{
    padding:15px 25px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:gold;
    color:black;
    cursor:pointer;
    box-shadow:0 0 10px gold;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px gold;
}

/* footer */
footer{
    margin-top:40px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="logo">
<img src="1lgocdrr1a.jpg">
</div>

<h1>My CDRR Screencaps</h1>

<div class="gallery">
<button onclick="prevImage()">⟵</button>

<img id="galleryImage" src="cdrr001.jpg" onclick="fullscreenImage()">

<button onclick="nextImage()">⟶</button>
</div>

<footer>
Click the image to view fullscreen
</footer>

<script>
const images = [
"cdrr001.jpg",
"cdrr002.jpg",
"cdrr003.jpg"
];

let index = 0;

function showImage(){
document.getElementById("galleryImage").src = images[index];
}

function nextImage(){
index++;
if(index >= images.length){ index = 0; }
showImage();
}

function prevImage(){
index--;
if(index < 0){ index = images.length - 1; }
showImage();
}

function fullscreenImage(){
let img = document.getElementById("galleryImage");

if(img.requestFullscreen){
img.requestFullscreen();
}
else if(img.webkitRequestFullscreen){
img.webkitRequestFullscreen();
}
}
</script>

</body>
</html>
